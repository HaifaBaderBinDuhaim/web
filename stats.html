<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Progress and Statistics  - Smart Study Planner</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/progressStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>

    <div class="container">
        <h1>Progress &amp; Statistics</h1>

        <div class="stats-box">
            <p>Total Courses: <span id="totalCourses">0</span></p>
            <p>Total Tasks: <span id="totalTasks">0</span></p>
            <p>Assignments: <span id="assignmentsCount">0</span></p>
            <p>Exams: <span id="examsCount">0</span></p>
        </div>

        <button onclick="window.location.href='dashboard.html'" class="btn">Back to Dashboard</button>
    </div>

      <!-- FR6: Progress Tracking -->
            <div class="progress-section">
                <h2>Your Progress</h2>
                <div class="progress-cards">
                    <div class="card">
                        <h3>Completion Rate</h3>
                        <div class="number" id="completionRate">0%</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="completionFill" style="width: 0%"></div>
                        </div>
                        <div class="buttons">
                            <button class="btn-complete" id="markComplete">✓ Complete</button>
                            <button class="btn-missed" id="markMissed">✗ Missed</button>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Total Sessions</h3>
                        <div class="number" id="totalSessions">0</div>
                        <p>Completed: <span id="completedCount">0</span></p>
                        <p>Missed: <span id="missedCount">0</span></p>
                    </div>
                </div>
            </div>


             <!-- FR8: Statistics & Analytics -->
            <div class="stats-section">
                <h2>Study Hours</h2>
                <div class="chart-container">
                    <canvas id="weeklyChart"></canvas>
                </div>
                <div class="stats-info">
                    <p>Weekly Hours: <span id="weeklyHours">0</span></p>
                </div>

                <h2>Course Distribution</h2>
                <div class="chart-container">
                    <canvas id="distributionChart"></canvas>
                </div>

                <h2>Course Details</h2>
                <table class="stats-table">
                    <thead>
                        <tr><th>Course</th><th>Hours</th><th>Complete %</th></tr>
                    </thead>
                    <tbody id="courseTable">
                        <tr><td colspan="3">No data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>


    <script src="../js/stats.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Helper - Smart Study Planner</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="container">
        <h1>AI Study Helper</h1>

        <form id="aiForm" onsubmit="event.preventDefault(); getAIResponse();">
            <label>Ask the AI anything:</label>
            <textarea id="userQuestion" rows="4" required></textarea>

            <button type="submit">Ask</button>
        </form>

        <h2>AI Response</h2>
        <div id="aiResponse" class="ai-box"></div>

        <button onclick="window.location.href='dashboard.html'" class="btn">Back to Dashboard</button>
    </div>

    <script src="../js/ai-helper.js"></script>
</body>
</html>

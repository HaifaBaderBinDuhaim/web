<!doctype html>
<html lnag="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart study planner</title>
    <link rel="stylesheet" href="styleLogin.css" />
  </head>
  <body class="body">
    <article class="register">
      <h1 class="header1">Create your account!</h1>
      <h3 class="quote">Start your journey to smarter planning today</h3>
      <nav class="background">
        <form>
          <label for="name" class="labels">Name</label><br />
          <input
            id="name"
            name="name"
            type="text"
            class="whiteButton"
            placeholder="enter your name"
          />
          <br />
          <br />
          <lable for="email" class="labels">Email address</lable><br />
          <input
            id="email"
            name="email"
            type="text"
            placeholder="enter your email"
            class="whiteButton"
          /><br />
          <br />
          <lable for="password" class="labels">Password</lable><br />
          <input
            id="password"
            name="password"
            type="password"
            placeholder="enter password"
            class="whiteButton"
          /><br />
          <br />
          <input type="checkbox" id="agreement" />
          <lable for="agreement"> I agree to the poilcy </lable>
        </form>
        <button id="Sign Up" name="Sign Up" class="button">Sign Up</button>

        <h5>
          Have an accout?<a
            href="logIn.html"
            alt="sign up"
            target="_blank"
            class="sign-up"
          >
            Sign in</a
          >
        </h5>
      </nav>
    </article>
    <!-- <img
      src="studying .png"
      alt="studying"
      height="700"
      width="700"
      class="image"
    /> -->
  </body>
</html>

<!doctype html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <tilte>smart study planner</tilte>
    <link rel="stylesheet" href="styleLogin.css" />
  </head>
  <body class="body">
    <article class="register">
      <h1 class="header1">Welcome back!</h1>
      <h3 class="quote">Plan your time, shape your future</h3>
      <nav class="background">
        <form>
          <label for="email" class="labels">Email address</label><br />
          <input
            id="email"
            name="email"
            type="text"
            placeholder="enter your name"
            class="whiteButton"
          /><br />
          <br />
          <label for="password" class="labels">Password</label><br />
          <input
            id="password"
            name="password"
            type="password"
            placeholder="enter your password"
            class="whiteButton"
          /><br />
          <br />
          <input type="checkbox" id="reminder" />
          <lable for="reminder">Remember me for 30 days</lable><br />
          <br />
          <button type="button" class="button" onclick="goToPage()">
            Sign In
          </button>

          <script>
            function goToPage() {
              window.location.href = "courses2.html";
            }
          </script>
        </form>

        <h5>
          Don't have an account?
          <a href="register.html" alt="sign in" target="_blank" class="sign-up"
            >Sign Up</a
          >
        </h5>
      </nav>
    </article>
    <!-- <img
      src="studying .png"
      alt="studying"
      height="700"
      width="700"
      class="image"
    /> -->
  </body>
</html>

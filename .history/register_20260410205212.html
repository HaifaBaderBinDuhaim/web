<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Study Planner - Register</title>
    <link rel="stylesheet" href="styleLogin.css" />
  </head>
  <body class="body">
    <article class="register">
      <div class="heading">
        <h1 class="header1">Create your account!</h1>
        <h3 class="quote">Start your journey to smarter planning today</h3>
      </div>

      <section class="background">
        <form class="form">
          <div class="input-group">
            <label for="name" class="labels">Name</label>
            <input
              id="name"
              name="name"
              type="text"
              class="whiteButton"
              placeholder="Enter your name"
            />
          </div>

          <div class="input-group">
            <label for="email" class="labels">Email address</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="Enter your email"
              class="whiteButton"
            />
          </div>

          <div class="input-group">
            <label for="password" class="labels">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter password"
              class="whiteButton"
            />
          </div>

          <div class="check-row">
            <input type="checkbox" id="agreement" />
            <label for="agreement" class="check-label"
              >I agree to the policy</label
            >
          </div>

          <button type="button" class="button" onclick="goToPage()">
            Sign Up
          </button>

          <h5 class="account-text">
            Have an account?
            <a href="logIn.html" target="_blank" class="sign-up">Sign in</a>
          </h5>
        </form>
      </section>
    </article>

    <script>
      function goToPage() {
        window.location.href = "courses2.html";
      }
    </script>
  </body>
</html>

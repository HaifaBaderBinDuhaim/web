<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar</title>
    <link rel="stylesheet" href="styleLogin.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="body-sidebare">
    <div class="sidebar">
      <div class="logo">
        <i data-lucide="flower-2"></i>
        <span>Untitled</span>
      </div>

      <div class="menu">
        <div class="item">
          <i data-lucide="home"></i>
          <a href="#" alt="home page">Home</a>
        </div>

        <div class="item">
          <i data-lucide="layout-dashboard"></i>
          <a href="#" alt="home page">Dashboard</a>
          <span></span>
        </div>

        <div class="item">
          <i data-lucide="folder"></i>
          <span>Projects</span>
        </div>

        <div class="item">
          <i data-lucide="layers-3"></i>
          <span>Tasks</span>
        </div>

        <div class="item">
          <i data-lucide="bar-chart-3"></i>
          <span>Reporting</span>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <tilte>smart study planner</tilte>
    <link rel="stylesheet" href="styleLogin.css" />
  </head>
  <body class="body">
    <article class="register">
      <h1>Welcome back!</h1>
      <h3>Plan your time, shape your future</h3>
      <nav class="background">
        <form>
          <label for="email">Email address</label><br />
          <input
            id="email"
            name="email"
            type="text"
            placeholder="enter your name"
            class="whiteButton"
          /><br />
          <br />
          <label for="password">Password</label><br />
          <input
            id="password"
            name="password"
            type="password"
            placeholder="enter your password"
            class="whiteButton"
          /><br />
          <br />
          <input type="checkbox" id="reminder" />
          <lable for="reminder">Remember me for 30 days</lable><br />
          <br />
          <button id="login" name="login" class="button">Login</button>
        </form>

        <h5>
          Don't have an account?
          <a href="register.html" alt="sign in" target="_blank" class="sign-up"
            >Sign In</a
          >
        </h5>
      </nav>
    </article>
    <img src="studying .png" alt="studying" class="image" />
  </body>
</html>
